<!-- ==================== LOGIN PAGE ==================== -->
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo & Title -->
    <div class="auth-card__header">
      <div class="auth-card__logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"></path>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
        </svg>
      </div>
      <h1 class="auth-card__title">TaskFlow</h1>
      <p class="auth-card__subtitle">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form" id="form-login" novalidate>

      <!-- Email Field -->
      <div class="form-group">
        <label for="input-email">Email</label>
        <input
          id="input-email"
          type="email"
          formControlName="email"
          class="form-control"
          [class.is-invalid]="email.invalid && email.touched"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <p class="form-error" *ngIf="email.invalid && email.touched">
          <ng-container *ngIf="email.errors?.['required']">Email wajib diisi.</ng-container>
          <ng-container *ngIf="email.errors?.['email']">Format email tidak valid.</ng-container>
        </p>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="input-password">Password</label>
        <div class="input-password-wrapper">
          <input
            id="input-password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="form-control"
            [class.is-invalid]="password.invalid && password.touched"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword" id="btn-toggle-password">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <p class="form-error" *ngIf="password.invalid && password.touched">
          <ng-container *ngIf="password.errors?.['required']">Password wajib diisi.</ng-container>
          <ng-container *ngIf="password.errors?.['minlength']">Password minimal 6 karakter.</ng-container>
        </p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn--primary btn--full"
        id="btn-login-submit"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="btn-spinner"></span>
        <span>{{ isLoading ? 'Signing in...' : 'Sign In' }}</span>
      </button>

    </form>

    <!-- Footer link ke register -->
    <p class="auth-card__footer">
      Belum punya akun?
      <a routerLink="/auth/register" id="link-to-register">Daftar sekarang</a>
    </p>

    <!-- Demo Credentials -->
    <div class="demo-creds">
      <p class="demo-creds__title">Demo Credentials</p>
      <div class="demo-creds__list">
        <span class="badge badge--admin">Admin</span> admin&#64;taskflow.dev
        &nbsp;|&nbsp;
        <span class="badge badge--manager">Manager</span> manager&#64;taskflow.dev
        &nbsp;|&nbsp;
        <span class="badge badge--member">Member</span> member&#64;taskflow.dev
      </div>
      <p class="demo-creds__pass">Password: <code>password123</code></p>
    </div>

  </div>
</div>
